<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自動排班系統</title>
<style>
  /* ====== 基礎變數（亮色預設） ====== */
  :root{
    --color-primary: #2563eb;
    --color-primary-dark: #1d4ed8;
    --color-danger: #dc2626;
    --color-danger-bg: #fee2e2;
    --color-success: #16a34a;
    --color-success-bg: #dcfce7;
    --color-bg: #f3f4f6;
    --color-card: #ffffff;
    --color-border: #e5e7eb;
    --color-text: #1f2937;
    --color-text-light: #6b7280;
    --color-input-bg: #ffffff;
    --color-cell-bg: #fafafa;
    --color-slot-bg: #ffffff;
    --color-chip-bg: #eef2ff;
    --color-chip-text: #3730a3;
    --color-hover-bg: #f0f1f3;
    --color-overlay: rgba(0,0,0,.5);
    --color-note-bg: #fef9c3;
    --color-note-text: #854d0e;
    --color-warning: #b45309;
    --radius: 8px;
  }
  /* ====== 暗色主題變數覆寫 ====== */
  :root[data-theme="dark"]{
    --color-primary: #3b82f6;
    --color-primary-dark: #2563eb;
    --color-danger: #f87171;
    --color-danger-bg: rgba(248,113,113,.18);
    --color-success: #4ade80;
    --color-success-bg: rgba(74,222,128,.18);
    --color-bg: #0f172a;
    --color-card: #1e293b;
    --color-border: #334155;
    --color-text: #e5e7eb;
    --color-text-light: #94a3b8;
    --color-input-bg: #0f172a;
    --color-cell-bg: #1e293b;
    --color-slot-bg: #16213a;
    --color-chip-bg: #312e81;
    --color-chip-text: #c7d2fe;
    --color-hover-bg: #334155;
    --color-overlay: rgba(0,0,0,.7);
    --color-note-bg: rgba(250,204,21,.12);
    --color-note-text: #fde68a;
    --color-warning: #fbbf24;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    transition: background-color .2s ease, color .2s ease;
  }
  h1,h2,h3{ margin: 0 0 8px 0; }
  button{
    cursor:pointer;
    border:none;
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 14px;
    background: var(--color-card);
    border: 1px solid var(--color-border);
    color: var(--color-text);
    transition: background .15s;
  }
  button:hover{ background: var(--color-hover-bg); }
  button.primary{ background: var(--color-primary); color:#fff; border-color: var(--color-primary); }
  button.primary:hover{ background: var(--color-primary-dark); }
  button.danger{ background: var(--color-card); color: var(--color-danger); border-color: var(--color-danger); }
  button.danger:hover{ background: var(--color-danger-bg); }
  input[type="text"], input[type="number"], input[type="time"], input[type="date"], input[type="month"]{
    padding:6px 8px;
    border:1px solid var(--color-border);
    border-radius:6px;
    font-size:14px;
    width:100%;
    background: var(--color-input-bg);
    color: var(--color-text);
  }
  label{ display:block; margin-bottom:10px; font-size:14px; }
  label > span{ display:block; margin-bottom:4px; }
  select{
    padding:6px 8px;
    border:1px solid var(--color-border);
    border-radius:6px;
    font-size:14px;
    background: var(--color-input-bg);
    color: var(--color-text);
  }
  .time-select-row{ display:flex; align-items:center; gap:6px; }
  .time-select-row select{ flex:1; }
  .time-select-row span{ font-weight:600; color: var(--color-text-light); }
  .checkbox-row{ display:flex; align-items:center; gap:6px; }
  .checkbox-row input{ width:auto; }
  .checkbox-row > span{ margin-bottom:0; }
  .hidden{ display:none !important; }

  /* ====== 上方功能列 ====== */
  .toolbar{
    background: var(--color-card);
    border-bottom: 1px solid var(--color-border);
    padding: 12px 16px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    position: sticky;
    top:0;
    z-index: 50;
  }
  .toolbar h1{ font-size:18px; white-space:nowrap; }
  .topbar-controls{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .month-nav{ display:flex; align-items:center; gap:4px; }
  .month-nav button{ padding:6px 10px; font-weight:700; }
  .month-nav input[type="month"]{ width:auto; }
  .search-box input{
    width:150px; padding:6px 8px;
    border:1px solid var(--color-border); border-radius:6px;
    background: var(--color-input-bg); color: var(--color-text); font-size:13px;
  }
  /* 深淺色 Switch */
  .switch{ position:relative; display:inline-block; width:46px; height:24px; flex-shrink:0; }
  .switch input{ opacity:0; width:0; height:0; }
  .switch .slider{
    position:absolute; inset:0; background: var(--color-border);
    border-radius:24px; cursor:pointer; transition: background .2s;
  }
  .switch .slider::before{
    content:""; position:absolute; width:18px; height:18px; left:3px; top:3px;
    background: var(--color-card); border-radius:50%; transition: transform .2s;
  }
  .switch input:checked + .slider{ background: var(--color-primary); }
  .switch input:checked + .slider::before{ transform:translateX(22px); }
  /* 設定選單 */
  .settings-menu-wrap{ position:relative; }
  .settings-menu{
    position:absolute; right:0; top:calc(100% + 6px);
    background: var(--color-card); border:1px solid var(--color-border); border-radius:8px;
    box-shadow:0 4px 16px rgba(0,0,0,.18); min-width:170px; z-index:60;
    display:flex; flex-direction:column; padding:4px;
  }
  .settings-menu button{ border:none; background:transparent; text-align:left; padding:8px 12px; border-radius:6px; }
  .settings-menu button:hover{ background: var(--color-hover-bg); }
  .user-chip{ display:flex; align-items:center; gap:6px; font-size:13px; color: var(--color-text-light); }
  .user-avatar{
    width:28px; height:28px; border-radius:50%; background: var(--color-primary); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;
    flex-shrink:0;
  }

  /* ====== 月曆獨立畫面：覆蓋整個瀏覽器視窗，格子自動填滿 ====== */
  .calendar-view{
    position:fixed; inset:0; z-index:80;
    background: var(--color-bg);
    display:flex; flex-direction:column;
    padding:12px 16px;
    gap:8px;
  }
  .calendar-view-header{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; flex-wrap:wrap; flex-shrink:0;
  }
  .calendar-view-header h2{ margin:0; font-size:18px; }
  .calendar-view-title{ display:flex; align-items:center; gap:12px; }
  .calendar-view-actions{ display:flex; align-items:center; gap:8px; }

  /* 班表下方：違規摘要 + 快速調班 */
  .calendar-footer{
    flex-shrink:0;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    max-height:30vh;
    min-height:0;
  }
  .calendar-footer-panel{
    background: var(--color-card);
    border:1px solid var(--color-border);
    border-radius: var(--radius);
    padding:10px 14px;
    overflow-y:auto;
    min-height:0;
  }
  .calendar-footer-panel h3{ margin:0 0 8px; font-size:14px; }
  .calendar-footer .violation-list{ max-height:none; }
  .calendar-footer .quick-swap-form{
    display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;
  }
  .calendar-footer .quick-swap-form label{
    flex:1 1 130px; margin:0;
  }
  @media (max-width:700px){
    .calendar-footer{ grid-template-columns:1fr; }
  }

  .first-time-note{
    background: var(--color-note-bg);
    color: var(--color-note-text);
    font-size:13px;
    padding:8px 16px;
    text-align:center;
  }

  /* ====== 主版面：Dashboard（月曆 + 三張工作卡片） ====== */
  .app-container{
    display:flex;
    flex-direction:column;
    gap:16px;
    padding:16px;
  }
  .panel-block{
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding:14px;
  }
  /* ====== 首頁：介紹 + 今日班表 + 功能按鈕 ====== */
  .home-intro p{
    margin:0; font-size:14px; color: var(--color-text-light); line-height:1.7;
  }
  .home-main{
    display:grid;
    grid-template-columns: minmax(280px, 380px) 1fr;
    gap:16px;
    align-items:start;
  }
  @media (max-width: 900px){
    .home-main{ grid-template-columns: 1fr; }
  }
  .home-tiles{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap:12px;
  }
  .home-tile{
    display:flex; flex-direction:column; align-items:flex-start; gap:6px;
    padding:20px 18px; text-align:left;
    border:1px solid var(--color-border); border-radius: var(--radius);
    background: var(--color-card);
  }
  .home-tile:hover{ background: var(--color-hover-bg); }
  .tile-title{ font-size:15px; font-weight:700; }
  .tile-sub{ font-size:12px; color: var(--color-text-light); }
  .tile-sub.tile-sub-bad{ color: var(--color-danger); font-weight:700; }
  .today-info{ font-size:13px; color: var(--color-text-light); margin-bottom:8px; }
  .today-list{ display:flex; flex-direction:column; gap:4px; max-height:260px; overflow-y:auto; }
  .today-row{
    display:flex; justify-content:space-between; align-items:baseline; gap:8px;
    font-size:13px; background: var(--color-hover-bg); border-radius:6px; padding:6px 8px;
  }
  .today-row strong{ flex-shrink:0; }
  .today-row span{ color: var(--color-text-light); text-align:right; }
  .quick-swap-form label{ margin-bottom:8px; }
  .link-btn{
    border:none; background:transparent; color: var(--color-primary);
    padding:4px 0; font-size:13px;
  }
  .link-btn:hover{ background:transparent; text-decoration:underline; }

  /* ====== Drawer 抽屜面板 ====== */
  .drawer-overlay{ position:fixed; inset:0; background: var(--color-overlay); z-index:90; }
  .drawer{
    position:fixed; top:0; right:0; bottom:0;
    width:400px; max-width:92vw;
    background: var(--color-card);
    border-left:1px solid var(--color-border);
    z-index:95;
    display:flex; flex-direction:column;
    box-shadow:-4px 0 20px rgba(0,0,0,.2);
    transform:translateX(100%);
    transition:transform .25s ease;
    visibility:hidden;
  }
  .drawer.open{ transform:translateX(0); visibility:visible; }
  .drawer-header{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 16px; border-bottom:1px solid var(--color-border); flex-shrink:0;
  }
  .drawer-header h3{ margin:0; }
  .drawer-close{ border:none; background:transparent; font-size:16px; padding:4px 8px; }
  .drawer-body{ padding:14px 16px; overflow-y:auto; flex:1; }
  .drawer-body .item-list{ max-height:none; }
  .drawer-add-btn{ width:100%; margin-bottom:12px; }
  .system-actions{ display:flex; flex-wrap:wrap; gap:8px; padding:8px; }

  /* ====== 員工 / 班別卡片清單 ====== */
  .item-list{ display:flex; flex-direction:column; gap:10px; max-height:320px; overflow-y:auto; }
  .empty-hint{ color: var(--color-text-light); font-size:13px; }
  .item-card{
    border:1px solid var(--color-border);
    border-radius:6px;
    padding:8px 10px;
    font-size:13px;
  }
  .item-card-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .item-card-body div{ color: var(--color-text-light); margin-bottom:2px; }
  .item-card-actions{ display:flex; gap:6px; margin-top:6px; }
  .item-card-actions button{ padding:4px 10px; font-size:12px; }
  .badge{ font-size:11px; padding:2px 6px; border-radius:10px; }
  .badge-yes{ background: var(--color-success-bg); color: var(--color-success); }
  .badge-no{ background: var(--color-hover-bg); color: var(--color-text-light); }
  .color-dot{
    display:inline-block; width:10px; height:10px; border-radius:50%;
    margin-right:6px; vertical-align:middle; flex-shrink:0;
  }

  /* ====== 規則設定表單 ====== */
  .rules-form label{ font-weight:500; }
  .legal-hint{
    display:block; font-weight:400; font-size:11px; color: var(--color-text-light);
    margin:-4px 0 8px 0;
  }
  .legal-disclaimer{
    font-size:11px; color: var(--color-text-light); margin:0 0 10px 0; line-height:1.5;
  }
  .sub-label{ font-size:12px; font-weight:600; color: var(--color-text-light); margin-top:4px; margin-bottom:4px; }
  .preference-overview{ display:flex; flex-direction:column; gap:4px; max-height:160px; overflow-y:auto; }
  .preference-row{
    display:flex; justify-content:space-between; align-items:baseline; gap:8px;
    font-size:12px; background: var(--color-hover-bg); border-radius:6px; padding:4px 8px;
  }
  .preference-row strong{ flex-shrink:0; }
  .preference-row span{ color: var(--color-text-light); text-align:right; }

  /* ====== 月曆：格子自動填滿視窗寬高 ====== */
  .calendar-weekdays{
    display:grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap:6px;
    flex-shrink:0;
  }
  .calendar-grid{
    display:grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    grid-auto-rows: minmax(0, 1fr);
    gap:6px;
    flex:1;
    min-height:0;
  }
  .calendar-weekdays div{
    text-align:center;
    font-weight:600;
    color: var(--color-text-light);
    font-size:13px;
    padding:4px 0;
  }
  .calendar-cell.holiday-cell{ background: var(--color-hover-bg); }
  .holiday-badge{
    font-size:10px; font-weight:700;
    color: var(--color-danger);
    border:1px solid var(--color-danger);
    border-radius:8px; padding:0 5px; margin-left:6px;
    vertical-align:middle;
  }
  .calendar-cell{
    border:1px solid var(--color-border);
    border-radius:6px;
    min-height:0;
    padding:6px;
    background: var(--color-cell-bg);
    display:flex;
    flex-direction:column;
    gap:4px;
    overflow-y:auto;
  }
  .calendar-cell.empty{ background:transparent; border:none; }
  .cell-date{ font-weight:600; font-size:13px; }
  .cell-shifts{ display:flex; flex-direction:column; gap:6px; }
  .shift-slot{
    background: var(--color-slot-bg);
    border:1px solid var(--color-border);
    border-radius:6px;
    padding:4px 6px;
  }
  .shift-slot.night-slot{ border-left:3px solid #4338ca; }
  .shift-slot.slot-violation{ border-color: var(--color-danger); background: var(--color-danger-bg); }
  .slot-header{ font-size:12px; font-weight:600; display:flex; justify-content:space-between; }
  .slot-count{ color: var(--color-text-light); font-weight:400; }
  .slot-violation .slot-count{ color: var(--color-danger); font-weight:700; }
  .slot-chips{ display:flex; flex-wrap:wrap; gap:4px; margin:4px 0; }
  .chip{
    background: var(--color-chip-bg);
    color: var(--color-chip-text);
    border-radius:10px;
    padding:1px 6px;
    font-size:11px;
    display:flex;
    align-items:center;
    gap:3px;
  }
  .chip.chip-violation{ background: var(--color-danger-bg); color: var(--color-danger); font-weight:700; }
  .chip.chip-hit{ outline:2px solid var(--color-primary); }
  .chip.chip-dim{ opacity:.25; }
  .chip-remove{
    border:none; background:transparent; color:inherit; cursor:pointer;
    padding:0; font-size:12px; line-height:1; font-weight:700;
  }
  .add-select{
    width:100%; font-size:11px; padding:2px; border-radius:4px;
    border:1px solid var(--color-border); background: var(--color-input-bg); color: var(--color-text);
  }

  /* ====== 規則符合狀態 ====== */
  .status-ok{ background: var(--color-success-bg); color: var(--color-success); padding:8px; border-radius:6px; font-weight:600; }
  .status-bad{ background: var(--color-danger-bg); color: var(--color-danger); padding:8px; border-radius:6px; font-weight:600; }
  .status-neutral{ background: var(--color-hover-bg); color: var(--color-text-light); padding:8px; border-radius:6px; font-weight:600; }
  .violation-list{ max-height:220px; overflow-y:auto; margin:10px 0 0; padding-left:18px; font-size:13px; }
  .violation-list li{ margin-bottom:4px; }
  .violation-list li.violation-red{ color: var(--color-danger); font-weight:600; }
  .violation-list li.violation-yellow{ color: var(--color-warning); font-weight:600; }

  /* ====== Modal ====== */
  .modal-overlay{
    position:fixed; inset:0; background: var(--color-overlay);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:16px;
  }
  .modal{
    background: var(--color-card); color: var(--color-text); border-radius:10px; padding:20px;
    width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
  }
  fieldset{ border:1px solid var(--color-border); border-radius:6px; margin-bottom:12px; }
  legend{ font-size:13px; color: var(--color-text-light); padding:0 4px; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:10px; }
  .date-add-row{ display:flex; gap:6px; margin-bottom:8px; }
  .date-add-row input{ flex:1; }
  .tag-list{ display:flex; flex-wrap:wrap; gap:6px; }
  .tag{
    background: var(--color-hover-bg); border-radius:10px; padding:2px 8px; font-size:12px;
    display:flex; align-items:center; gap:4px;
  }
  .tag button{ border:none; background:transparent; padding:0; font-weight:700; cursor:pointer; color: var(--color-text); }
  .checkbox-grid{ display:flex; flex-wrap:wrap; gap:8px; padding:8px; }
  .checkbox-grid label{ margin:0; display:flex; align-items:center; gap:4px; width:auto; font-weight:400; }
  .checkbox-grid input{ width:auto; }

  /* ====== Toast ====== */
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:#1f2937; color:#fff; padding:10px 18px; border-radius:6px;
    font-size:14px; z-index:200;
  }
</style>
</head>
<body>

  <!-- 上方功能列：月份切換、搜尋、語言、深淺色、設定、使用者 -->
  <header class="toolbar">
    <h1 id="appTitle">自動排班系統</h1>
    <div class="topbar-controls">
      <div class="month-nav">
        <button id="btnPrevMonth" type="button">‹</button>
        <input type="month" id="topMonth">
        <button id="btnNextMonth" type="button">›</button>
      </div>
      <div class="search-box">
        <input type="text" id="searchEmployee" placeholder="搜尋員工">
      </div>
      <select id="langSelect">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      <label class="switch" id="themeSwitchLabel">
        <input type="checkbox" id="themeSwitch">
        <span class="slider"></span>
      </label>
      <div class="settings-menu-wrap">
        <button id="btnSettings" type="button">設定</button>
        <div id="settingsMenu" class="settings-menu hidden">
          <button id="menuEmployees" type="button">員工管理</button>
          <button id="menuShifts" type="button">班別管理</button>
          <button id="menuRules" type="button">規則設定</button>
          <button id="menuSystem" type="button">系統設定</button>
        </div>
      </div>
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userNameDisplay"></span>
      </div>
    </div>
  </header>

  <div id="firstTimeNote" class="first-time-note"></div>

  <main class="app-container">

    <!-- 系統介紹 -->
    <div class="panel-block home-intro">
      <h2 id="lblIntroTitle">關於本系統</h2>
      <p id="introText"></p>
    </div>

    <div class="home-main">

      <!-- 今日班表 -->
      <div class="panel-block">
        <h2 id="lblTodayTitle">今日班表</h2>
        <div id="todayInfo" class="today-info"></div>
        <div id="todayList" class="today-list"></div>
      </div>

      <!-- 功能入口按鈕 -->
      <div class="home-tiles">
        <button type="button" class="home-tile" id="tileCalendar">
          <span class="tile-title" id="tileCalendarTitle">班表月曆</span>
          <span class="tile-sub" id="tileCalendarSub"></span>
        </button>
        <button type="button" class="home-tile" id="tileEmployees">
          <span class="tile-title" id="tileEmployeesTitle">員工管理</span>
          <span class="tile-sub" id="tileEmployeesSub"></span>
        </button>
        <button type="button" class="home-tile" id="tileShifts">
          <span class="tile-title" id="tileShiftsTitle">班別管理</span>
          <span class="tile-sub" id="tileShiftsSub"></span>
        </button>
        <button type="button" class="home-tile" id="tileRules">
          <span class="tile-title" id="tileRulesTitle">規則設定</span>
        </button>
        <button type="button" class="home-tile" id="tileSystem">
          <span class="tile-title" id="tileSystemTitle">系統設定</span>
        </button>
      </div>

    </div>
  </main>

  const $ = id => document.getElementById(id);

  const UI_PREFS_KEY = "autoshift_ui_prefs_v1";

  function uid(prefix){
    return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
  }

  function pad(n){ return String(n).padStart(2, "0"); }

  function formatDate(y, m, day){
    return `${y}-${pad(m)}-${pad(day)}`;
  }

  // 用「年/月/日」建構 Date，避免字串轉 Date 受時區影響造成日期跑掉
  function parseDateStr(dateStr){
    const [y, m, d] = dateStr.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function shiftHours(shift){
    const [sh, sm] = shift.start.split(":").map(Number);
    const [eh, em] = shift.end.split(":").map(Number);
    let startMin = sh * 60 + sm;
    let endMin = eh * 60 + em;
    if (endMin <= startMin) endMin += 24 * 60; // 跨夜
    return (endMin - startMin) / 60;
  }

  function addDays(dateStr, n){
    const d = parseDateStr(dateStr);
    d.setDate(d.getDate() + n);
    return formatDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
  }

  // 以「該週的星期一」作為週的識別鍵（週一～週日為一週，可正確跨月）
  function getWeekKey(dateStr){
    const d = parseDateStr(dateStr);
    const dow = (d.getDay() + 6) % 7; // 0 = 週一
    d.setDate(d.getDate() - dow);
    return formatDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
  }

  // 目前檢視月份的所有日期字串
  function getMonthDates(){
    const [y, m] = state.rules.month.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    const arr = [];
    for (let day = 1; day <= numDays; day++) arr.push(formatDate(y, m, day));
    return arr;
  }

  /* =========================================================
   * 勞動基準法強制規定（不可被使用者調整超過的法定上限/下限）
   * - 第30條：正常工作時間，每日不得超過 8 小時，每週不得超過 40 小時
   * - 第36條：每七日中應有二日之休息，其中一日為例假，一日為休息日；
   *           每週強制二日休息 → 最多連續上班 5 天
   * ========================================================= */
  const LABOR_LAW = {
    MAX_DAILY_HOURS: 8,
    MAX_CONSECUTIVE_DAYS: 5,
    MAX_WEEKLY_HOURS: 40,
    OFF_DAYS_PER_WEEK_CYCLE: 2
  };

  // 依該月天數換算「一例一休」要求的最低休假天數（每滿7天至少2天休假）
  function getLegalMinOffDays(numDays){
    return Math.floor(numDays / 7) * LABOR_LAW.OFF_DAYS_PER_WEEK_CYCLE;
  }

  // 確保目前規則設定沒有超過/低於勞基法強制規定的範圍，若有則自動修正
  function enforceLegalLimits(){
    const r = state.rules;
    let touched = false;
    if (r.maxDailyHours > LABOR_LAW.MAX_DAILY_HOURS){ r.maxDailyHours = LABOR_LAW.MAX_DAILY_HOURS; touched = true; }
    if (r.maxConsecutiveDays > LABOR_LAW.MAX_CONSECUTIVE_DAYS){ r.maxConsecutiveDays = LABOR_LAW.MAX_CONSECUTIVE_DAYS; touched = true; }
    if (r.maxWeeklyHours > LABOR_LAW.MAX_WEEKLY_HOURS){ r.maxWeeklyHours = LABOR_LAW.MAX_WEEKLY_HOURS; touched = true; }
    const [y, m] = r.month.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    const minOff = getLegalMinOffDays(numDays);
    if (r.monthlyOffDays < minOff){ r.monthlyOffDays = minOff; touched = true; }
    return touched;
  }

  // 依員工 ID 算出一個穩定的專屬顏色，方便在日曆上快速辨識不同員工
  function colorForEmployee(empId){
    let hash = 0;
    for (let i = 0; i < empId.length; i++){
      hash = (hash * 31 + empId.charCodeAt(i)) >>> 0;
    }
    const hue = hash % 360;
    return { bg: `hsl(${hue}, 70%, 88%)`, text: `hsl(${hue}, 70%, 26%)` };
  }

  let toastTimer = null;
  function showToast(msg){
    const t = $("toast");
    t.textContent = msg;
    t.classList.remove("hidden");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.add("hidden"), 2200);
  }

  /* =========================================================
   * 資料模型 / 預設值
   * ========================================================= */
  function defaultState(){
    const now = new Date();
    const month = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;
    return {
      employees: [],
      shifts: [],
      rules: {
        month: month,
        monthlyOffDays: 8,
        maxConsecutiveDays: 5,
        restAfterNight: true,
        maxDailyHours: 8,
        maxWeeklyHours: 40,
        fairness: true,
        preference: true,
        holidays: [] // 公休日（"YYYY-MM-DD"），當天不排班
      },
      schedule: {}
    };
  }

  function mergeWithDefaults(parsed){
    const def = defaultState();
    parsed = parsed || {};
    const rules = Object.assign({}, def.rules, parsed.rules || {});
    if (!Array.isArray(rules.holidays)) rules.holidays = [];
    return {
      employees: Array.isArray(parsed.employees) ? parsed.employees : def.employees,
      shifts: Array.isArray(parsed.shifts) ? parsed.shifts : def.shifts,
      rules,
      schedule: (parsed.schedule && typeof parsed.schedule === "object") ? parsed.schedule : def.schedule
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return mergeWithDefaults(JSON.parse(raw));
    }catch(e){
      console.error("讀取本機資料失敗", e);
    }
    return defaultState();
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();
  if (enforceLegalLimits()) saveState(); // 舊存檔若超過新法定上限，載入時立即修正並回存

  /* =========================================================
   * 確保排班表結構完整
   * ========================================================= */
  function ensureScheduleForMonth(){
    const [y, m] = state.rules.month.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    for (let day = 1; day <= numDays; day++){
      const dateStr = formatDate(y, m, day);
      if (!state.schedule[dateStr]) state.schedule[dateStr] = {};
      state.shifts.forEach(shift => {
        if (!state.schedule[dateStr][shift.id]) state.schedule[dateStr][shift.id] = [];
      });
    }
  }

  /* =========================================================
   * 自動排班演算法
   * ========================================================= */
  function generateSchedule(){
    if (state.employees.length === 0 || state.shifts.length === 0){
      alert(t("alertNeedEmployeesShifts"));
      return;
    }
    if (!confirm(t("confirmGenerateOverwrite"))){
      return;
    }

    const { employees, shifts, rules } = state;
    const [y, m] = rules.month.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    const targetWorkDays = Math.max(numDays - rules.monthlyOffDays, 0);

    const newSchedule = {};

    const consecutiveStreak = {};
    const workedNightYesterday = {};
    const assignedCount = {};
    const workedDaysCount = {};
    const weeklyHours = {};

    employees.forEach(emp => {
      consecutiveStreak[emp.id] = 0;
      workedNightYesterday[emp.id] = false;
      assignedCount[emp.id] = 0;
      workedDaysCount[emp.id] = 0;
      weeklyHours[emp.id] = {};
    });

    for (let day = 1; day <= numDays; day++){
      const dateStr = formatDate(y, m, day);
      const weekKey = getWeekKey(dateStr);
      newSchedule[dateStr] = {};
      shifts.forEach(shift => { newSchedule[dateStr][shift.id] = []; });

      // 公休日整天不排班，全員休息（連續上班數歸零、夜班後休息條件也解除）
      if (rules.holidays.includes(dateStr)){
        employees.forEach(emp => {
          consecutiveStreak[emp.id] = 0;
          workedNightYesterday[emp.id] = false;
        });
        continue;
      }

      const workedToday = new Set();

      shifts.forEach(shift => {
        const need = shift.requiredCount;
        const hours = shiftHours(shift);

        let candidates = employees.filter(emp => {
          if (workedToday.has(emp.id)) return false;
          if (!emp.allowedShifts.includes(shift.id)) return false;
          if (emp.unavailableDates.includes(dateStr)) return false;
          if (shift.isNight && !emp.canNightShift) return false;
          if (rules.restAfterNight && workedNightYesterday[emp.id]) return false;
          if (consecutiveStreak[emp.id] >= rules.maxConsecutiveDays) return false;
          if (hours > rules.maxDailyHours) return false;
          const wh = weeklyHours[emp.id][weekKey] || 0;
          if (wh + hours > rules.maxWeeklyHours) return false;
          return true;
        });

        candidates.sort((a, b) => {
          let scoreA = 0, scoreB = 0;

          if (rules.fairness){
            scoreA += assignedCount[a.id];
            scoreB += assignedCount[b.id];
          }
          if (rules.preference){
            scoreA += a.preferredShifts.includes(shift.id) ? -5 : 0;
            scoreB += b.preferredShifts.includes(shift.id) ? -5 : 0;
          }
          const remainingDays = numDays - day + 1;
          const neededA = targetWorkDays - workedDaysCount[a.id];
          const neededB = targetWorkDays - workedDaysCount[b.id];
          scoreA += -(neededA / Math.max(remainingDays, 1)) * 3;
          scoreB += -(neededB / Math.max(remainingDays, 1)) * 3;

          return scoreA - scoreB;
        });

        const chosen = candidates.slice(0, need);
        chosen.forEach(emp => {
          newSchedule[dateStr][shift.id].push(emp.id);
          workedToday.add(emp.id);
          assignedCount[emp.id]++;
          workedDaysCount[emp.id]++;
          weeklyHours[emp.id][weekKey] = (weeklyHours[emp.id][weekKey] || 0) + hours;
        });
      });

      employees.forEach(emp => {
        consecutiveStreak[emp.id] = workedToday.has(emp.id) ? consecutiveStreak[emp.id] + 1 : 0;
      });

      employees.forEach(emp => { workedNightYesterday[emp.id] = false; });
      shifts.filter(s => s.isNight).forEach(shift => {
        newSchedule[dateStr][shift.id].forEach(empId => { workedNightYesterday[empId] = true; });
      });
    }

    Object.keys(newSchedule).forEach(dateStr => { state.schedule[dateStr] = newSchedule[dateStr]; });

    saveState();
    renderCalendar();
    showToast(t("toastGenerated"));
  }

  /* =========================================================
   * 規則檢查
   * 日曆格子本身已用紅色標示出「不可上班別/不想上班日/夜班資格/人數不足」
   * 等單純配對錯誤，這些不重複列出。但若手動調整造成「一天排太多班、
   * 連續上班超標、單班超時」等實際違反勞基法的情形，仍會列在下方清單：
   *   - 紅色：違反勞基法強制規定（一天多班、單班超時、連續上班超標、
   *           每週工時超標、法定最低休假天數）
   *   - 黃色：未達規則設定的目標、未滿足員工偏好、或夜班後未依規則休息
   *           （合法，但未盡理想）
   * ========================================================= */
  function computeViolations(){
    const { employees, shifts, rules, schedule } = state;
    const listViolations = []; // 下方清單顯示用，含 level: "red" | "yellow"
    let totalCount = 0; // 總體狀態計數，含日曆已標示紅色的問題
    const redSlot = new Set();
    const redChip = new Set();

    const empMap = {}; employees.forEach(e => { empMap[e.id] = e; });
    const shiftMap = {}; shifts.forEach(s => { shiftMap[s.id] = s; });

    // 只統計「目前檢視月份」的日期，不累加其他月份的歷史資料
    const dates = getMonthDates();

    // 整月完全沒有任何排班（只有切換月份時建立的空殼）→ 視為「尚未排班」，
    // 不把每個空格子都算成人數不足的違規
    const unscheduled = dates.every(date => {
      const day = schedule[date];
      return !day || Object.keys(day).every(sid => day[sid].length === 0);
    });
    if (unscheduled){
      return { listViolations, totalCount, redSlot, redChip, unscheduled };
    }

    const worksOn = (empId, date) => {
      const day = schedule[date];
      if (!day) return false;
      return Object.keys(day).some(sid => day[sid].includes(empId));
    };

    dates.forEach(date => {
      const daySchedule = schedule[date];
      const workedShiftsOfEmp = {};
      const isHoliday = rules.holidays.includes(date);

      Object.keys(daySchedule).forEach(shiftId => {
        const shift = shiftMap[shiftId];
        if (!shift) return;
        const assigned = daySchedule[shiftId];

        // 公休日不需人力，不算人數不足；反之若仍排了人則提醒
        if (!isHoliday && assigned.length < shift.requiredCount){
          redSlot.add(`${date}_${shiftId}`);
          totalCount++;
        }
        if (isHoliday){
          assigned.forEach(empId => {
            const emp = empMap[empId];
            listViolations.push({ level: "yellow", message: t("v_holidayAssigned", date, emp ? emp.name : t("unknownEmployee")) });
            redChip.add(`${date}_${shiftId}_${empId}`);
            totalCount++;
          });
        }
        if (shiftHours(shift) > rules.maxDailyHours){
          redSlot.add(`${date}_${shiftId}`);
          listViolations.push({ level: "red", message: t("v_dailyHours", date, shift.name, shiftHours(shift), rules.maxDailyHours) });
          totalCount++;
        }

        assigned.forEach(empId => {
          const emp = empMap[empId];
          workedShiftsOfEmp[empId] = workedShiftsOfEmp[empId] || [];
          workedShiftsOfEmp[empId].push(shiftId);

          if (!emp) return;
          let bad = false;
          if (!emp.allowedShifts.includes(shiftId)) bad = true;
          if (emp.unavailableDates.includes(date)) bad = true;
          if (shift.isNight && !emp.canNightShift) bad = true;
          if (bad){ redChip.add(`${date}_${shiftId}_${empId}`); totalCount++; }
        });
      });

      Object.keys(workedShiftsOfEmp).forEach(empId => {
        if (workedShiftsOfEmp[empId].length > 1){
          const emp = empMap[empId];
          listViolations.push({ level: "red", message: t("v_duplicate", date, emp ? emp.name : t("unknownEmployee")) });
          totalCount++;
          workedShiftsOfEmp[empId].forEach(shiftId => redChip.add(`${date}_${shiftId}_${empId}`));
        }
      });
    });

    // 夜班後休息：檢查本月每一天的「前一天」是否有夜班（可跨到上個月月底）
    if (rules.restAfterNight){
      dates.forEach(date => {
        const prevSchedule = schedule[addDays(date, -1)];
        if (!prevSchedule) return;

        const nightWorkers = new Set();
        Object.keys(prevSchedule).forEach(shiftId => {
          const shift = shiftMap[shiftId];
          if (shift && shift.isNight) prevSchedule[shiftId].forEach(id => nightWorkers.add(id));
        });

        const daySchedule = schedule[date] || {};
        nightWorkers.forEach(empId => {
          Object.keys(daySchedule).forEach(shiftId => {
            if (daySchedule[shiftId].includes(empId)){
              const emp = empMap[empId];
              listViolations.push({ level: "yellow", message: t("v_noRest", date, emp ? emp.name : t("unknownEmployee")) });
              redChip.add(`${date}_${shiftId}_${empId}`);
              totalCount++;
            }
          });
        });
      });
    }

    // 連續上班：往前月回溯計算月初的既有連續數，但只回報落在本月的違規
    employees.forEach(emp => {
      let streak = 0;
      let back = addDays(dates[0], -1);
      let guard = 0;
      while (worksOn(emp.id, back) && guard < 62){ streak++; back = addDays(back, -1); guard++; }

      dates.forEach(date => {
        if (worksOn(emp.id, date)){
          streak++;
          if (streak > rules.maxConsecutiveDays){
            listViolations.push({ level: "red", message: t("v_consecutive", date, emp.name, rules.maxConsecutiveDays) });
            totalCount++;
            Object.keys(schedule[date]).forEach(shiftId => {
              if (schedule[date][shiftId].includes(emp.id)) redChip.add(`${date}_${shiftId}_${emp.id}`);
            });
          }
        } else {
          streak = 0;
        }
      });
    });

    // 每週檢查（週一～週日為一週，跨月日期若有排班資料也會納入）：
    // - 每週工時超過法定上限 → 紅色
    // - 每七日休息不足二日（一例假一休息日，勞基法第36條）→ 紅色
    const weekStarts = [...new Set(dates.map(getWeekKey))];
    weekStarts.forEach(weekStart => {
      const weekDates = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));
      employees.forEach(emp => {
        let hours = 0, workedDays = 0;
        weekDates.forEach(d => {
          const day = schedule[d];
          if (!day) return;
          let worked = false;
          Object.keys(day).forEach(shiftId => {
            if (day[shiftId].includes(emp.id)){
              worked = true;
              const shift = shiftMap[shiftId];
              if (shift) hours += shiftHours(shift);
            }
          });
          if (worked) workedDays++;
        });

        if (hours > rules.maxWeeklyHours){
          listViolations.push({ level: "red", message: t("v_weeklyHours", emp.name, weekStart, Math.round(hours * 10) / 10, rules.maxWeeklyHours) });
          totalCount++;
        }
        const offDays = 7 - workedDays;
        if (workedDays > 0 && offDays < LABOR_LAW.OFF_DAYS_PER_WEEK_CYCLE){
          listViolations.push({ level: "red", message: t("v_weeklyRest", emp.name, weekStart, offDays, LABOR_LAW.OFF_DAYS_PER_WEEK_CYCLE) });
          totalCount++;
        }
      });
    });

    // 休假天數：低於勞基法法定最低天數 → 紅色；合法但未達規則設定目標 → 黃色
    if (dates.length > 0){
      const legalMinOffDays = getLegalMinOffDays(dates.length);
      employees.forEach(emp => {
        const workedDays = dates.filter(date =>
          Object.keys(schedule[date]).some(shiftId => schedule[date][shiftId].includes(emp.id))
        ).length;
        const offDays = dates.length - workedDays;
        if (offDays < legalMinOffDays){
          listViolations.push({ level: "red", message: t("v_offDaysLegal", emp.name, offDays, legalMinOffDays) });
          totalCount++;
        } else if (offDays < rules.monthlyOffDays){
          listViolations.push({ level: "yellow", message: t("v_offDaysTarget", emp.name, offDays, rules.monthlyOffDays) });
          totalCount++;
        }
      });
    }

    // 員工偏好：有設定偏好班別、本月有上班，但完全沒被排到偏好班別 → 黃色（合法，僅未盡理想）
    if (rules.preference){
      employees.forEach(emp => {
        if (emp.preferredShifts.length === 0) return;
        let workedDays = 0, matchedDays = 0;
        dates.forEach(date => {
          const assignedShiftIds = Object.keys(schedule[date]).filter(shiftId => schedule[date][shiftId].includes(emp.id));
          if (assignedShiftIds.length > 0){
            workedDays++;
            if (assignedShiftIds.some(id => emp.preferredShifts.includes(id))) matchedDays++;
          }
        });
        if (workedDays > 0 && matchedDays === 0){
          listViolations.push({ level: "yellow", message: t("v_preferenceNotMet", emp.name) });
          totalCount++;
        }
      });
    }

    return { listViolations, totalCount, redSlot, redChip, unscheduled: false };
  }

      </div>`;

  // 最近一次計算出的違規標記
  let lastRedSlot = new Set();
  let lastRedChip = new Set();
  // TopBar 員工搜尋字串（小寫），非空時月曆上符合的 chip 高亮、其餘淡化
  let searchQuery = "";
  // 違規清單是否展開全部（預設只顯示前 5 條）
  let violationsExpanded = false;
  const VIOLATION_PREVIEW_COUNT = 5;

  // 產生某一天的班別卡片 HTML
  function buildDayShiftsHtml(dateStr){
    const daySchedule = state.schedule[dateStr] || {};

    return state.shifts.map(shift => {
      const assigned = daySchedule[shift.id] || [];
      const slotKey = `${dateStr}_${shift.id}`;
      const isSlotRed = lastRedSlot.has(slotKey);

      const chipsHtml = assigned.map(empId => {
        const emp = state.employees.find(e => e.id === empId);
        const chipKey = `${dateStr}_${shift.id}_${empId}`;
        const isChipRed = lastRedChip.has(chipKey);
        const colorStyle = isChipRed ? "" : (() => {
          const c = colorForEmployee(empId);
          return ` style="background:${c.bg};color:${c.text};"`;
        })();
        const name = emp ? emp.name : t("unknownEmployee");
        let searchClass = "";
        if (searchQuery){
          searchClass = name.toLowerCase().includes(searchQuery) ? " chip-hit" : " chip-dim";
        }
        return `<span class="chip ${isChipRed ? "chip-violation" : ""}${searchClass}"${colorStyle}>${escapeHtml(name)}<button type="button" class="chip-remove" data-date="${dateStr}" data-shift="${shift.id}" data-emp="${empId}">×</button></span>`;
      }).join("");

      return `<div class="shift-slot ${isSlotRed ? "slot-violation" : ""} ${shift.isNight ? "night-slot" : ""}">
        <div class="slot-header"><span>${escapeHtml(shift.name)}</span><span class="slot-count">${assigned.length}/${shift.requiredCount}</span></div>
        <div class="slot-chips">${chipsHtml}</div>
        <select class="add-select" data-date="${dateStr}" data-shift="${shift.id}">
          <option value="">${escapeHtml(t("addEmployeeOption"))}</option>
          ${state.employees.filter(e => !assigned.includes(e.id)).map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join("")}
        </select>
      </div>`;
    }).join("");
  }

  // 產生整月所有日期格子的 HTML（不含星期標頭）
  function buildCalendarBodyHtml(){
    const [y, m] = state.rules.month.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    const firstWeekday = (new Date(y, m - 1, 1).getDay() + 6) % 7;

    let html = "";
    for (let i = 0; i < firstWeekday; i++){
      html += `<div class="calendar-cell empty"></div>`;
    }
    for (let day = 1; day <= numDays; day++){
      const dateStr = formatDate(y, m, day);
      const isHoliday = state.rules.holidays.includes(dateStr);
      html += `<div class="calendar-cell${isHoliday ? " holiday-cell" : ""}">
        <div class="cell-date">${day}${isHoliday ? `<span class="holiday-badge">${escapeHtml(t("holidayBadge"))}</span>` : ""}</div>
        <div class="cell-shifts">${buildDayShiftsHtml(dateStr)}</div>
      </div>`;
    }
    return html;
  }

  function renderCalendar(){
    ensureScheduleForMonth();

    const [y, m] = state.rules.month.split("-").map(Number);
    $("calendarMonthLabel").textContent = t("monthLabel", y, m);

    const { listViolations, totalCount, redSlot, redChip, unscheduled } = computeViolations();
    lastRedSlot = redSlot;
    lastRedChip = redChip;

    $("calendarGrid").innerHTML = buildCalendarBodyHtml();

    const summaryEl = $("statusSummary");
    if (unscheduled){
      summaryEl.innerHTML = `<div class="status-neutral">${escapeHtml(t("statusUnscheduled"))}</div>`;
    } else if (totalCount === 0){
      summaryEl.innerHTML = `<div class="status-ok">${escapeHtml(t("statusOk"))}</div>`;
    } else {
      summaryEl.innerHTML = `<div class="status-bad">${escapeHtml(t("statusBad", totalCount))}</div>`;
    }

    // 首頁功能按鈕的即時摘要文字
    $("tileCalendarSub").textContent = t("monthLabel", y, m);
    $("tileEmployeesSub").textContent = t("tileEmployeesCount", state.employees.length);
    $("tileShiftsSub").textContent = t("tileShiftsCount", state.shifts.length);

    // 違規摘要卡片：預設只列前幾條，可展開全部
    const shown = violationsExpanded ? listViolations : listViolations.slice(0, VIOLATION_PREVIEW_COUNT);
    $("violationList").innerHTML = shown.map(v =>
      `<li class="${v.level === "red" ? "violation-red" : "violation-yellow"}">${escapeHtml(v.message)}</li>`
    ).join("");
    const toggleBtn = $("btnToggleViolations");
    if (listViolations.length > VIOLATION_PREVIEW_COUNT){
      toggleBtn.classList.remove("hidden");
      toggleBtn.textContent = violationsExpanded ? t("collapseViolations") : t("showAllViolations", listViolations.length);
    } else {
      toggleBtn.classList.add("hidden");
    }

    renderTodayCard();
    renderQuickSwap();
  }

  /* =========================================================
   * 今日班表卡片
   * ========================================================= */
  function renderTodayCard(){
    const now = new Date();
    const todayStr = formatDate(now.getFullYear(), now.getMonth() + 1, now.getDate());
    const wd = t("weekdays")[(now.getDay() + 6) % 7];
    $("todayInfo").textContent = t("todayDateInfo", todayStr, wd);

    const daySchedule = state.schedule[todayStr] || {};
    const rows = state.shifts.map(shift => {
      const assigned = (daySchedule[shift.id] || [])
        .map(id => state.employees.find(e => e.id === id))
        .filter(Boolean).map(e => e.name);
      if (assigned.length === 0) return "";
      return `<div class="today-row"><strong>${escapeHtml(shift.name)}</strong><span>${escapeHtml(assigned.join(t("listSep")))}</span></div>`;
    }).filter(Boolean).join("");

    $("todayList").innerHTML = rows || `<p class="empty-hint">${escapeHtml(t("todayEmpty"))}</p>`;
  }

  /* =========================================================
   * 快速調班卡片：選日期 + 班別，把 A 換成 B
   * ========================================================= */
  function renderQuickSwap(){
    const [y, m] = state.rules.month.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    const dateInput = $("swapDate");
    dateInput.min = formatDate(y, m, 1);
    dateInput.max = formatDate(y, m, numDays);
    if (!dateInput.value || dateInput.value < dateInput.min || dateInput.value > dateInput.max){
      dateInput.value = dateInput.min;
    }

    const shiftSel = $("swapShift");
    const prevShift = shiftSel.value;
    shiftSel.innerHTML = state.shifts.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join("");
    if (prevShift && state.shifts.some(s => s.id === prevShift)) shiftSel.value = prevShift;

    renderSwapEmployeeSelects();
  }

  function renderSwapEmployeeSelects(){
    const date = $("swapDate").value;
    const shiftId = $("swapShift").value;
    const assigned = (state.schedule[date] && state.schedule[date][shiftId]) ? state.schedule[date][shiftId] : [];

    const fromSel = $("swapFrom");
    const assignedEmps = assigned.map(id => state.employees.find(e => e.id === id)).filter(Boolean);
    fromSel.innerHTML = assignedEmps.length
      ? `<option value="">${escapeHtml(t("optSelect"))}</option>` +
        assignedEmps.map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join("")
      : `<option value="">${escapeHtml(t("swapNoAssigned"))}</option>`;

    const toSel = $("swapTo");
    const others = state.employees.filter(e => !assigned.includes(e.id));
    toSel.innerHTML = `<option value="">${escapeHtml(t("optSelect"))}</option>` +
      others.map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join("");
  }

  function doQuickSwap(){
    const date = $("swapDate").value;
    const shiftId = $("swapShift").value;
    const fromId = $("swapFrom").value;
    const toId = $("swapTo").value;
    if (!date || !shiftId || !fromId || !toId){
      alert(t("alertSwapIncomplete"));
      return;
    }
    const slot = state.schedule[date] && state.schedule[date][shiftId];
    if (!slot || !slot.includes(fromId)) return;
    state.schedule[date][shiftId] = slot.map(id => id === fromId ? toId : id);
    saveState();
    renderCalendar();
    showToast(t("toastSwapDone"));
  }

  /* =========================================================
   * 手動調整班表
   * ========================================================= */
  function addToSlot(date, shiftId, empId){
    if (!empId) return;
    if (!state.schedule[date]) state.schedule[date] = {};
    if (!state.schedule[date][shiftId]) state.schedule[date][shiftId] = [];
    if (state.schedule[date][shiftId].includes(empId)) return;
    state.schedule[date][shiftId].push(empId);
    saveState();
    renderCalendar();
  }

  function removeFromSlot(date, shiftId, empId){
    if (!state.schedule[date] || !state.schedule[date][shiftId]) return;
    state.schedule[date][shiftId] = state.schedule[date][shiftId].filter(id => id !== empId);
    saveState();
    renderCalendar();
  }

  function renderUnavailableTags(){
    const container = $("employeeUnavailableList");
    container.innerHTML = modalUnavailableDates.map((d, idx) =>
      `<span class="tag">${escapeHtml(d)}<button type="button" data-idx="${idx}">×</button></span>`
    ).join("");
  }

  function openEmployeeModal(employeeId){
    const emp = employeeId ? state.employees.find(e => e.id === employeeId) : null;

    $("employeeModalTitle").textContent = emp ? t("titleEditEmployee") : t("titleAddEmployee");
    $("employeeId").value = emp ? emp.id : "";
    $("employeeName").value = emp ? emp.name : "";
    $("employeeCanNight").checked = emp ? emp.canNightShift : false;

    modalUnavailableDates = emp ? emp.unavailableDates.slice() : [];
    renderUnavailableTags();
    $("employeeUnavailableInput").value = "";

    renderShiftCheckboxes("employeeAllowedShifts", emp ? emp.allowedShifts : []);
    renderShiftCheckboxes("employeePreferredShifts", emp ? emp.preferredShifts : []);

    $("employeeModal").classList.remove("hidden");
  }

  function closeEmployeeModal(){
    $("employeeModal").classList.add("hidden");
  }

  function saveEmployeeFromModal(){
    const name = $("employeeName").value.trim();
    if (!name){
      alert(t("alertNeedName"));
      return;
    }
    const allowedShifts = Array.from($("employeeAllowedShifts").querySelectorAll("input:checked")).map(i => i.value);
    const preferredShifts = Array.from($("employeePreferredShifts").querySelectorAll("input:checked")).map(i => i.value);
    const canNightShift = $("employeeCanNight").checked;
    const editingId = $("employeeId").value;

    if (editingId){
      const emp = state.employees.find(e => e.id === editingId);
      emp.name = name;
      emp.allowedShifts = allowedShifts;
      emp.preferredShifts = preferredShifts;
      emp.unavailableDates = modalUnavailableDates.slice();
      emp.canNightShift = canNightShift;
    } else {
      state.employees.push({
        id: uid("emp"),
        name, allowedShifts, preferredShifts,
        unavailableDates: modalUnavailableDates.slice(),
        canNightShift
      });
    }

    saveState();
    closeEmployeeModal();
    renderAll();
    showToast(t("toastEmployeeSaved"));
  }

  function deleteEmployee(employeeId){
    const emp = state.employees.find(e => e.id === employeeId);
    if (!emp) return;
    if (!confirm(t("confirmDeleteEmployee", emp.name))) return;

    state.employees = state.employees.filter(e => e.id !== employeeId);
    Object.keys(state.schedule).forEach(date => {
      Object.keys(state.schedule[date]).forEach(shiftId => {
        state.schedule[date][shiftId] = state.schedule[date][shiftId].filter(id => id !== employeeId);
      });
    });

    saveState();
    renderAll();
    showToast(t("toastEmployeeDeleted"));
  }

  /* =========================================================
   * 班別 Modal
   * ========================================================= */
  // 用下拉選單直接選「幾點幾分」，不需要靠 time input 的上下鍵微調
  function populateTimeSelects(){
    const hourOptions = Array.from({ length: 24 }, (_, h) => `<option value="${pad(h)}">${pad(h)}</option>`).join("");
    const minuteOptions = Array.from({ length: 60 }, (_, mi) => `<option value="${pad(mi)}">${pad(mi)}</option>`).join("");
    $("shiftStartHour").innerHTML = hourOptions;
    $("shiftStartMinute").innerHTML = minuteOptions;
    $("shiftEndHour").innerHTML = hourOptions;
    $("shiftEndMinute").innerHTML = minuteOptions;
  }

  function openShiftModal(shiftId){
    const shift = shiftId ? state.shifts.find(s => s.id === shiftId) : null;

    $("shiftModalTitle").textContent = shift ? t("titleEditShift") : t("titleAddShift");
    $("shiftId").value = shift ? shift.id : "";
    $("shiftName").value = shift ? shift.name : "";

    const [startH, startM] = (shift ? shift.start : "00:00").split(":");
    const [endH, endM] = (shift ? shift.end : "00:00").split(":");
    $("shiftStartHour").value = startH;
    $("shiftStartMinute").value = startM;
    $("shiftEndHour").value = endH;
    $("shiftEndMinute").value = endM;

    $("shiftRequired").value = shift ? shift.requiredCount : 1;
    $("shiftIsNight").checked = shift ? shift.isNight : false;

    $("shiftModal").classList.remove("hidden");
  }

  function closeShiftModal(){
    $("shiftModal").classList.add("hidden");
  }

  function saveShiftFromModal(){
    const name = $("shiftName").value.trim();
    const start = `${$("shiftStartHour").value}:${$("shiftStartMinute").value}`;
    const end = `${$("shiftEndHour").value}:${$("shiftEndMinute").value}`;
    const requiredCount = parseInt($("shiftRequired").value, 10);
    const isNight = $("shiftIsNight").checked;
    const editingId = $("shiftId").value;

    if (!name || !requiredCount || requiredCount < 1){
      alert(t("alertShiftIncomplete"));
      return;
    }

    if (editingId){
      const shift = state.shifts.find(s => s.id === editingId);
      shift.name = name;
      shift.start = start;
      shift.end = end;
      shift.requiredCount = requiredCount;
      shift.isNight = isNight;
    } else {
      state.shifts.push({ id: uid("shift"), name, start, end, requiredCount, isNight });
    }

    saveState();
    closeShiftModal();
    renderAll();
    showToast(t("toastShiftSaved"));
  }

  function deleteShift(shiftId){
    const shift = state.shifts.find(s => s.id === shiftId);
    if (!shift) return;
    if (!confirm(t("confirmDeleteShift", shift.name))) return;

    state.shifts = state.shifts.filter(s => s.id !== shiftId);
    state.employees.forEach(emp => {
      emp.allowedShifts = emp.allowedShifts.filter(id => id !== shiftId);
      emp.preferredShifts = emp.preferredShifts.filter(id => id !== shiftId);
    });
    Object.keys(state.schedule).forEach(date => {
      delete state.schedule[date][shiftId];
    });

    saveState();
    renderAll();
    showToast(t("toastShiftDeleted"));
  }

  /* =========================================================
   * 匯出 / 匯入 / 複製月份 / 清除
   * ========================================================= */
  function downloadJSON(obj, filename){
    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function exportFull(){
    downloadJSON(state, `排班資料_全部.json`);
  }

  // 單月份匯出：員工/班別/規則 + 該月班表
  function exportMonth(){
    const month = state.rules.month;
    const monthSchedule = {};
    getMonthDates().forEach(d => {
      if (state.schedule[d]) monthSchedule[d] = state.schedule[d];
    });
    const payload = {
      type: "autoshift-month",
      month,
      employees: state.employees,
      shifts: state.shifts,
      rules: state.rules,
      schedule: monthSchedule
    };
    downloadJSON(payload, `排班資料_${month}.json`);
  }

  // 匯入：自動偵測「完整備份」或「單月份」格式
  function importJSON(file){
    const reader = new FileReader();
    reader.onload = evt => {
      try{
        const parsed = JSON.parse(evt.target.result);

        if (parsed && parsed.type === "autoshift-month" && parsed.month){
          // 單月份匯入：補進缺少的員工/班別，只覆蓋該月班表，不動其他月份
          (Array.isArray(parsed.employees) ? parsed.employees : []).forEach(emp => {
            if (!state.employees.some(e => e.id === emp.id)) state.employees.push(emp);
          });
          (Array.isArray(parsed.shifts) ? parsed.shifts : []).forEach(shift => {
            if (!state.shifts.some(s => s.id === shift.id)) state.shifts.push(shift);
          });
          Object.keys(state.schedule).forEach(d => {
            if (d.startsWith(parsed.month + "-")) delete state.schedule[d];
          });
          Object.keys(parsed.schedule || {}).forEach(d => {
            if (d.startsWith(parsed.month + "-")) state.schedule[d] = parsed.schedule[d];
          });
          state.rules.month = parsed.month; // 匯入後直接切到該月檢視
          enforceLegalLimits();
          saveState();
          renderAll();
          showToast(t("toastMonthImported", parsed.month));
        } else {
          state = mergeWithDefaults(parsed);
          enforceLegalLimits();
          saveState();
          renderAll();
          showToast(t("toastImportSuccess"));
        }
      }catch(err){
        alert(t("alertImportFail"));
      }
    };
    reader.readAsText(file);
  }

  // 複製月份班表（按星期對齊）：來源月的週間模式對應到目標月相同星期
  function copyMonthSchedule(fromMonth, toMonth){
    if (!fromMonth || !toMonth || fromMonth === toMonth){
      alert(t("alertCopyInvalid"));
      return;
    }
    const [fy, fm] = fromMonth.split("-").map(Number);
    const [ty, tm] = toMonth.split("-").map(Number);
    const fromDays = new Date(fy, fm, 0).getDate();
    const toDays = new Date(ty, tm, 0).getDate();
    const targetFirstDow = (new Date(ty, tm - 1, 1).getDay() + 6) % 7; // 0 = 週一

    // 找出來源月中第一個與「目標月1號」同星期的日期
    let s0 = 1;
    for (let d = 1; d <= 7; d++){
      if (((new Date(fy, fm - 1, d).getDay() + 6) % 7) === targetFirstDow){ s0 = d; break; }
    }

    for (let n = 1; n <= toDays; n++){
      let sd = s0 + (n - 1);
      while (sd > fromDays) sd -= 7; // 超出來源月時，重用最後一個相同星期的日子
      const src = state.schedule[formatDate(fy, fm, sd)];
      const dst = formatDate(ty, tm, n);
      state.schedule[dst] = {};
      state.shifts.forEach(shift => {
        state.schedule[dst][shift.id] = (src && src[shift.id]) ? src[shift.id].slice() : [];
      });
    }

    state.rules.month = toMonth; // 複製完直接切到目標月檢視
    enforceLegalLimits();
    saveState();
    renderAll();
    showToast(t("toastMonthCopied", fromMonth, toMonth));
  }

  function clearAllData(){
    if (!confirm(t("confirmClearAll"))) return;
    state = defaultState();
    saveState();
    renderAll();
    showToast(t("toastCleared"));
  }

  /* =========================================================
   * 檢視月份切換（TopBar）
   * ========================================================= */
  function setViewMonth(monthStr){
    if (!monthStr) return;
    state.rules.month = monthStr;
    const [y, m] = monthStr.split("-").map(Number);
    const numDays = new Date(y, m, 0).getDate();
    const minOff = getLegalMinOffDays(numDays);
    if (state.rules.monthlyOffDays < minOff){
      state.rules.monthlyOffDays = minOff;
      showToast(t("toastOffDaysFloored", minOff));
    }
    saveState();
    renderAll();
  }

  function shiftViewMonth(delta){
    const [y, m] = state.rules.month.split("-").map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    setViewMonth(`${d.getFullYear()}-${pad(d.getMonth() + 1)}`);
  }

  /* =========================================================
   * Drawer 抽屜開關
   * ========================================================= */
  let openDrawerEl = null;

  function openDrawer(id){
    closeDrawer();
    openDrawerEl = $(id);
    openDrawerEl.classList.add("open");
    $("drawerOverlay").classList.remove("hidden");

    // 開系統設定時預填「複製月份」的來源/目標（目前月 → 下個月）
    if (id === "drawerSystem"){
      if (!$("copyFromMonth").value) $("copyFromMonth").value = state.rules.month;
      if (!$("copyToMonth").value){
        const [y, m] = state.rules.month.split("-").map(Number);
        const d = new Date(y, m, 1);
        $("copyToMonth").value = `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
      }
    }
  }

  function closeDrawer(){
    if (openDrawerEl) openDrawerEl.classList.remove("open");
    openDrawerEl = null;
    $("drawerOverlay").classList.add("hidden");
  }

  /* =========================================================
   * 事件綁定
   * ========================================================= */
  function bindEvents(){
    // TopBar：月份切換 / 搜尋 / 語言 / 主題 / 設定選單 / 使用者
    $("btnPrevMonth").addEventListener("click", () => shiftViewMonth(-1));
    $("btnNextMonth").addEventListener("click", () => shiftViewMonth(1));
    $("topMonth").addEventListener("change", e => setViewMonth(e.target.value));

    $("searchEmployee").addEventListener("input", e => {
      searchQuery = e.target.value.trim().toLowerCase();
      renderCalendar();
    });

    $("langSelect").addEventListener("change", e => {
      uiPrefs.lang = e.target.value;
      saveUiPrefs();
      applyLanguage();
    });

    $("themeSwitch").addEventListener("change", e => {
      uiPrefs.theme = e.target.checked ? "dark" : "light";
      saveUiPrefs();
      applyTheme();
    });

    $("btnSettings").addEventListener("click", e => {
      e.stopPropagation();
      $("settingsMenu").classList.toggle("hidden");
    });
    document.addEventListener("click", () => $("settingsMenu").classList.add("hidden"));

    $("menuEmployees").addEventListener("click", () => openDrawer("drawerEmployees"));
    $("menuShifts").addEventListener("click", () => openDrawer("drawerShifts"));
    $("menuRules").addEventListener("click", () => openDrawer("drawerRules"));
    $("menuSystem").addEventListener("click", () => openDrawer("drawerSystem"));

    $("drawerOverlay").addEventListener("click", closeDrawer);
    document.querySelectorAll(".drawer-close").forEach(btn => btn.addEventListener("click", closeDrawer));

    $("userNameInput").addEventListener("input", e => {
      uiPrefs.userName = e.target.value;
      saveUiPrefs();
      renderUserInfo();
    });

    // 首頁功能入口
    $("tileCalendar").addEventListener("click", openCalendarView);
    $("tileEmployees").addEventListener("click", () => openDrawer("drawerEmployees"));
    $("tileShifts").addEventListener("click", () => openDrawer("drawerShifts"));
    $("tileRules").addEventListener("click", () => openDrawer("drawerRules"));
    $("tileSystem").addEventListener("click", () => openDrawer("drawerSystem"));

    // 月曆獨立畫面
    $("btnCloseCalendar").addEventListener("click", closeCalendarView);
    $("btnCalPrevMonth").addEventListener("click", () => shiftViewMonth(-1));
    $("btnCalNextMonth").addEventListener("click", () => shiftViewMonth(1));
    document.addEventListener("keydown", e => {
      if (e.key !== "Escape") return;
      if (openDrawerEl) closeDrawer();
      else closeCalendarView();
    });

    $("btnGenerate").addEventListener("click", generateSchedule);
    $("btnToggleViolations").addEventListener("click", () => {
      violationsExpanded = !violationsExpanded;
      renderCalendar();
    });
    $("swapDate").addEventListener("change", renderSwapEmployeeSelects);
    $("swapShift").addEventListener("change", renderSwapEmployeeSelects);
    $("btnDoSwap").addEventListener("click", doQuickSwap);

    // 員工 / 班別 Drawer
    $("btnAddEmployee").addEventListener("click", () => openEmployeeModal(null));
    $("btnAddShift").addEventListener("click", () => openShiftModal(null));

    // 系統設定 Drawer
    $("btnExportFull").addEventListener("click", exportFull);
    $("btnExportMonth").addEventListener("click", exportMonth);
    $("btnImport").addEventListener("click", () => $("fileImport").click());
    $("fileImport").addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) importJSON(file);
      e.target.value = "";
    });
    $("btnCopyMonth").addEventListener("click", () => {
      copyMonthSchedule($("copyFromMonth").value, $("copyToMonth").value);
    });
    $("btnClear").addEventListener("click", clearAllData);
    $("ruleMonthlyOffDays").addEventListener("input", e => {
      let v = Number(e.target.value) || 0;
      const [y, m] = state.rules.month.split("-").map(Number);
      const numDays = new Date(y, m, 0).getDate();
      const minOff = getLegalMinOffDays(numDays);
      if (v < minOff){
        v = minOff;
        e.target.value = v;
        showToast(t("toastOffDaysFloored", minOff));
      }
      state.rules.monthlyOffDays = v;
      saveState();
      renderCalendar();
    });
    $("ruleMaxConsecutiveDays").addEventListener("input", e => {
      let v = Number(e.target.value) || 1;
      if (v > LABOR_LAW.MAX_CONSECUTIVE_DAYS){
        v = LABOR_LAW.MAX_CONSECUTIVE_DAYS;
        e.target.value = v;
        showToast(t("toastConsecutiveCapped", LABOR_LAW.MAX_CONSECUTIVE_DAYS));
      }
      state.rules.maxConsecutiveDays = v;
      saveState();
      renderCalendar();
    });
    $("ruleRestAfterNight").addEventListener("change", e => { state.rules.restAfterNight = e.target.checked; saveState(); renderCalendar(); });
    $("ruleMaxDailyHours").addEventListener("input", e => {
      let v = Number(e.target.value) || 1;
      if (v > LABOR_LAW.MAX_DAILY_HOURS){
        v = LABOR_LAW.MAX_DAILY_HOURS;
        e.target.value = v;
        showToast(t("toastDailyHoursCapped", LABOR_LAW.MAX_DAILY_HOURS));
      }
      state.rules.maxDailyHours = v;
      saveState();
      renderCalendar();
    });
    $("ruleMaxWeeklyHours").addEventListener("input", e => {
      let v = Number(e.target.value) || 1;
      if (v > LABOR_LAW.MAX_WEEKLY_HOURS){
        v = LABOR_LAW.MAX_WEEKLY_HOURS;
        e.target.value = v;
        showToast(t("toastWeeklyHoursCapped", LABOR_LAW.MAX_WEEKLY_HOURS));
      }
      state.rules.maxWeeklyHours = v;
      saveState();
      renderCalendar();
    });
    $("ruleFairness").addEventListener("change", e => { state.rules.fairness = e.target.checked; saveState(); });
    $("rulePreference").addEventListener("change", e => { state.rules.preference = e.target.checked; saveState(); });

    // 公休日：新增 / 移除
    $("btnAddHoliday").addEventListener("click", () => {
      const val = $("ruleHolidayInput").value;
      if (!val) return;
      if (!state.rules.holidays.includes(val)){
        state.rules.holidays.push(val);
        state.rules.holidays.sort();
        saveState();
        renderHolidayTags();
        renderCalendar();
      }
      $("ruleHolidayInput").value = "";
    });
    $("ruleHolidayList").addEventListener("click", e => {
      const btn = e.target.closest("button[data-date]");
      if (!btn) return;
      state.rules.holidays = state.rules.holidays.filter(d => d !== btn.dataset.date);
      saveState();
      renderHolidayTags();
      renderCalendar();
    });

    $("employeeList").addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      if (btn.classList.contains("edit-btn")) openEmployeeModal(btn.dataset.id);
      else if (btn.classList.contains("delete-btn")) deleteEmployee(btn.dataset.id);
    });

    $("shiftList").addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      if (btn.classList.contains("edit-btn")) openShiftModal(btn.dataset.id);
      else if (btn.classList.contains("delete-btn")) deleteShift(btn.dataset.id);
    });

    $("btnAddUnavailableDate").addEventListener("click", () => {
      const val = $("employeeUnavailableInput").value;
      if (val && !modalUnavailableDates.includes(val)){
        modalUnavailableDates.push(val);
        modalUnavailableDates.sort();
        renderUnavailableTags();
        $("employeeUnavailableInput").value = "";
      }
    });
    $("employeeUnavailableList").addEventListener("click", e => {
      const btn = e.target.closest("button");
      if (!btn) return;
      modalUnavailableDates.splice(Number(btn.dataset.idx), 1);
      renderUnavailableTags();
    });
    $("btnSaveEmployee").addEventListener("click", saveEmployeeFromModal);
    $("btnCancelEmployee").addEventListener("click", closeEmployeeModal);

    $("btnSaveShift").addEventListener("click", saveShiftFromModal);
    $("btnCancelShift").addEventListener("click", closeShiftModal);

    $("calendarGrid").addEventListener("click", e => {
      const btn = e.target.closest(".chip-remove");
      if (btn) removeFromSlot(btn.dataset.date, btn.dataset.shift, btn.dataset.emp);
    });
    $("calendarGrid").addEventListener("change", e => {
      if (e.target.classList.contains("add-select")){
        addToSlot(e.target.dataset.date, e.target.dataset.shift, e.target.value);
      }
    });
    $("employeeModal").addEventListener("click", e => { if (e.target.id === "employeeModal") closeEmployeeModal(); });
    $("shiftModal").addEventListener("click", e => { if (e.target.id === "shiftModal") closeShiftModal(); });
  }

  /* =========================================================
   * 初始化
   * ========================================================= */
  populateTimeSelects();
  bindEvents();
  applyTheme();
  applyLanguage(); // applyLanguage 內部會呼叫 renderAll()

})();
</script>
</body>
</html>
